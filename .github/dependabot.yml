version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "area: deps"
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/packages/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "area: docs"
      - "dependencies"
    commit-message:
      prefix: "chore(deps-docs)"
      include: "scope"
    groups:
      docs:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "area: rust"
      - "dependencies"
    commit-message:
      prefix: "chore(cargo)"
      include: "scope"
    groups:
      cargo:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "area: ci"
      - "dependencies"
    commit-message:
      prefix: "ci(actions)"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
