name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish @ambiently-work/faux
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: latest
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Add wasm32 Rust target
        run: rustup target add wasm32-unknown-unknown
      - name: Cache cargo registry & build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-
      - name: Cache wasm-pack binary
        id: wasm-pack-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}-v0.13.1
      - name: Install wasm-pack
        if: steps.wasm-pack-cache.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build wasm crate
        run: wasm-pack build --target web --out-dir pkg
      - name: Build TypeScript
        run: bunx tsc -b --force

      - name: Publish to npmjs (OIDC)
        run: npm publish --provenance --access public

      - name: Configure npmrc for GitHub Packages
        run: |
          {
            echo "@ambiently-work:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}"
          } > .npmrc
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com

  notify-consumers:
    name: Notify consumers of release
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch faux-released to agent-sdk
        env:
          GH_TOKEN: ${{ secrets.CONSUMER_DISPATCH_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          PACKAGE: "@ambiently-work/faux"
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/ambiently-work/agent-sdk/dispatches \
            -f event_type=faux-released \
            -F "client_payload[version]=$VERSION" \
            -F "client_payload[tag]=$TAG" \
            -F "client_payload[package]=$PACKAGE"
