name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "27 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bun-audit:
    name: bun audit (npm advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Advisory until pre-existing transitive vulns in the docs workspace
      # are addressed. Findings still appear in the run log.
      - name: Audit
        continue-on-error: true
        run: bun audit --prod

  cargo-audit:
    name: cargo audit (Rust advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install cargo-audit (prebuilt)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin" /tmp/cargo-audit
          curl -fsSL "https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv0.22.1/cargo-audit-x86_64-unknown-linux-musl-v0.22.1.tgz" \
            -o /tmp/cargo-audit.tgz
          tar -xzf /tmp/cargo-audit.tgz --strip-components=1 -C /tmp/cargo-audit
          install -m 0755 /tmp/cargo-audit/cargo-audit "$HOME/.local/bin/cargo-audit"

      - name: Run cargo audit
        run: |
          set -euo pipefail
          "$HOME/.local/bin/cargo-audit" audit

  cargo-deny:
    name: cargo deny (licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install cargo-deny
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin" /tmp/deny
          curl -fsSL https://github.com/EmbarkStudios/cargo-deny/releases/download/0.19.4/cargo-deny-0.19.4-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/deny.tar.gz
          tar -xzf /tmp/deny.tar.gz --strip-components=1 -C /tmp/deny
          install -m 0755 /tmp/deny/cargo-deny "$HOME/.local/bin/cargo-deny"

      - name: cargo deny check
        run: |
          set -euo pipefail
          "$HOME/.local/bin/cargo-deny" --all-features check

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin" /tmp/gitleaks
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks
          install -m 0755 /tmp/gitleaks/gitleaks "$HOME/.local/bin/gitleaks"

      - name: Run gitleaks
        run: |
          set -euo pipefail
          "$HOME/.local/bin/gitleaks" detect \
            --source . --config .gitleaks.toml --redact --verbose

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install trivy
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin" /tmp/trivy
          curl -fsSL https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz \
            -o /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp/trivy
          install -m 0755 /tmp/trivy/trivy "$HOME/.local/bin/trivy"

      - name: Run trivy fs scan
        run: |
          "$HOME/.local/bin/trivy" fs \
            --format sarif --output trivy-results.sarif \
            --ignore-unfixed --severity CRITICAL,HIGH \
            --scanners vuln,secret,misconfig \
            --exit-code 0 \
            .

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4  # v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install syft
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b "$HOME/.local/bin" v1.18.1

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          "$HOME/.local/bin/syft" scan dir:. -o cyclonedx-json=sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
