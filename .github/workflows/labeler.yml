name: Labeler

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  label-paths:
    name: Apply path-based labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9  # v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  label-size:
    name: Apply size label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: codelytv/pr-size-labeler@fb469dd4372da087f5f75175cc5ff84fda82b837  # v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size/xs"
          xs_max_size: "10"
          s_label: "size/s"
          s_max_size: "100"
          m_label: "size/m"
          m_max_size: "500"
          l_label: "size/l"
          l_max_size: "1000"
          xl_label: "size/xl"
          fail_if_xl: "false"
          message_if_xl: |
            This PR is larger than 1000 lines of changes. Consider splitting it into smaller PRs.
          files_to_ignore: |
            bun.lock
            Cargo.lock
            pkg/faux_wasm.js
            pkg/faux_wasm_bg.wasm
            pkg/faux_wasm.d.ts
            pkg/faux_wasm_bg.wasm.d.ts
