name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: latest
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  biome:
    name: Lint & format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run check

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build wasm crate (provides .d.ts for typecheck)
        run: wasm-pack build --target web --out-dir pkg

      - name: Typecheck
        run: bunx tsc -b --force

  test:
    name: Tests (bun test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build wasm crate
        run: wasm-pack build --target web --out-dir pkg

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
            awk -F: '
              /^SF:/ { files++ }
              /^LF:/ { lf += $2 }
              /^LH:/ { lh += $2 }
              END {
                if (lf > 0) printf("Lines: %d / %d (%.1f%%) across %d files\n", lh, lf, (lh/lf)*100, files)
              }
            ' coverage/lcov.info >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No coverage report produced." >> "$GITHUB_STEP_SUMMARY"
          fi

  test-matrix:
    name: Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build wasm crate
        run: wasm-pack build --target web --out-dir pkg

      - name: Run tests
        run: bun test

  rust-fmt:
    name: Rust format (cargo fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust lint (cargo clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy (host)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo clippy (wasm32)
        run: cargo clippy --target wasm32-unknown-unknown --all-features -- -D warnings

  rust-test:
    name: Rust tests (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-features --lib --bins --tests

  rust-doc:
    name: Rust doc build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo doc (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features

  rust-msrv:
    name: Rust MSRV check (1.78)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.78
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --target wasm32-unknown-unknown --all-features

  wasm-build:
    name: wasm-pack build & size budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Build wasm crate
        run: wasm-pack build --target web --out-dir pkg

      - name: Report wasm size
        id: wasm_size
        run: |
          set -euo pipefail
          WASM_PATH="pkg/faux_wasm_bg.wasm"
          if [ ! -f "$WASM_PATH" ]; then
            echo "::error::wasm artifact not found at $WASM_PATH"
            exit 1
          fi
          BYTES=$(wc -c < "$WASM_PATH")
          KB=$(( BYTES / 1024 ))
          echo "bytes=$BYTES" >> "$GITHUB_OUTPUT"
          echo "kb=$KB" >> "$GITHUB_OUTPUT"
          {
            echo "## WASM size"
            echo ""
            printf '%s — **%d KB** (%d bytes)\n' "$WASM_PATH" "$KB" "$BYTES"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce size budget (700 KB)
        env:
          BUDGET_KB: "700"
          ACTUAL_KB: ${{ steps.wasm_size.outputs.kb }}
        run: |
          set -euo pipefail
          if [ "$ACTUAL_KB" -gt "$BUDGET_KB" ]; then
            echo "::error::wasm size $ACTUAL_KB KB exceeds budget $BUDGET_KB KB"
            exit 1
          fi
          echo "wasm size $ACTUAL_KB KB is within budget ($BUDGET_KB KB)"

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/
          retention-days: 7

  package-verify:
    name: Verify publishable package (publint + attw)
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build wasm crate
        run: wasm-pack build --target web --out-dir pkg

      - name: Build TypeScript
        run: bunx tsc -b --force

      - name: npm pack (dry run)
        run: npm pack --dry-run

      # publint and attw are advisory while pre-existing packaging issues
      # are addressed (see issue tracker). They report findings into the job
      # summary without blocking PR merges.
      - name: publint (advisory)
        continue-on-error: true
        run: bunx publint@latest

      - name: Are the types wrong? (advisory)
        continue-on-error: true
        run: bunx --bun @arethetypeswrong/cli@latest --pack . --ignore-rules cjs-resolves-to-esm

  knip:
    name: Unused code (knip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build wasm crate
        run: wasm-pack build --target web --out-dir pkg

      - name: knip
        run: bunx knip@latest --no-progress

  docs:
    name: Docs (astro check & build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: astro check
        working-directory: packages/docs
        run: bunx astro check

      - name: Build docs
        run: bun run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: packages/docs/dist
          retention-days: 7

  required:
    name: All required checks passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - biome
      - typecheck
      - test
      - rust-fmt
      - rust-clippy
      - rust-test
      - rust-doc
      - rust-msrv
      - wasm-build
      - package-verify
      - knip
      - docs
    steps:
      - name: Verify all dependencies succeeded
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          echo "$NEEDS_JSON" | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          failed = [name for name, info in data.items() if info.get("result") not in ("success", "skipped")]
          if failed:
              print("Failed jobs:", ", ".join(failed))
              sys.exit(1)
          print("All required jobs passed.")
          '
