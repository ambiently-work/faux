name: Stale issues & PRs

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639  # v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,roadmap,help wanted"
          exempt-pr-labels: "pinned,security,WIP"
          stale-issue-message: |
            This issue has had no activity for 60 days. It will be closed in 14 days
            unless there's new activity. If it's still relevant, please leave a comment.
          stale-pr-message: |
            This PR has had no activity for 30 days. It will be closed in 14 days
            unless there's new activity. Push a commit or comment to keep it open.
          close-issue-message: |
            Closing due to inactivity. Reopen if this is still relevant.
          close-pr-message: |
            Closing due to inactivity. Reopen and push a new commit if you want to continue.
