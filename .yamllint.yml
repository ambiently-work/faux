extends: default

rules:
  line-length:
    max: 200
    level: warning
  document-start: disable
  truthy:
    allowed-values: ["true", "false", "on", "off"]
    check-keys: false
  comments:
    min-spaces-from-content: 1
  indentation:
    spaces: 2
    indent-sequences: consistent
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1

ignore: |
  node_modules/
  dist/
  pkg/
  target/
  packages/docs/.astro/
  bun.lock
